services:
  - type: web
    name: jap-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://jap-backend-qcmz.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
